<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Compagnon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Connexion Compagnon</h1>
</header>

<div class="container">
  <h2>Se connecter</h2>

  <label>Email</label>
  <input type="email" id="email" placeholder="Bénabar" required>

  <label>Mot de passe</label>
  <input type="password" id="password" placeholder="Votre mot de passe" required>

  <button id="loginBtn">Connexion</button>

  <p id="error" style="color:red; display:none; margin-top:10px;">
    Connexion impossible. Vérifie l'email ou le mot de passe.
  </p>
</div>

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
<script>
  const pb = new PocketBase("http://127.0.0.1:8090");

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
      // Authentification avec email + mot de passe
      const authData = await pb.collection("companions").authWithPassword(email, password);

      // Stocker l'ID du compagnon pour la page panier
      localStorage.setItem("companionId", authData.record.id);

      // Redirection vers la page panier
      window.location.href = "compagnon-panier.html";

    } catch (err) {
      document.getElementById("error").style.display = "block";
    }
  });
</script>

</body>
</html>
